<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>휴대폰광장 TechNote | 군산·서천 프리미엄 휴대폰</title>
  <meta name="description" content="군산·서천 프리미엄 휴대폰 전문점 휴대폰광장.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050507;
      --text: #f5f5f7;
      --muted: #86868b;
      --blue: #2997ff;
      --border: rgba(255,255,255,0.08);
      --card: rgba(28,28,32,0.85);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    /* ── 배경 글로우 ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 30%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,255,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 65%);
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 44px;
      background: rgba(5,5,7,0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand-ko {
      font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
      color: #ffffff;
    }
    .brand-en {
      font-family: 'Inter', sans-serif; font-weight: 800;
      font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.8px;
    }

    .header-contact {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; color: var(--muted);
      transition: color .2s;
    }
    .header-contact:hover { color: rgba(255,255,255,0.85); }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 12px;
    }

    /* ── Hub ── */
    .hub {
      position: relative;
      width: 640px;
      height: 640px;
      flex-shrink: 0;
    }

    .hub-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Orbit rings */
    .orbit-outer {
      position: absolute;
      top: 50%; left: 50%;
      width: 540px; height: 540px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
      animation: spin-cw 80s linear infinite;
    }

    .orbit-inner {
      position: absolute;
      top: 50%; left: 50%;
      width: 270px; height: 270px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.07);
      pointer-events: none;
      animation: spin-ccw 45s linear infinite;
    }

    @keyframes spin-cw  { to { transform: translate(-50%,-50%) rotate(360deg);  } }
    @keyframes spin-ccw { to { transform: translate(-50%,-50%) rotate(-360deg); } }

    /* ── Center ── */
    .hub-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      background: #111113;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 50%;
      border: none;
      box-shadow:
        0 0 80px rgba(255,255,255,0.05),
        0 24px 64px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
      animation: center-breathe 5s ease-in-out infinite;
    }

    /* 중앙 원 그라데이션 테두리 */
    .hub-center::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.06) 40%,
        rgba(255,255,255,0.02) 65%,
        rgba(255,255,255,0.14) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes center-breathe {
      0%,100% { box-shadow: 0 0 60px rgba(255,255,255,0.05), 0 20px 60px rgba(0,0,0,0.5); }
      50%      { box-shadow: 0 0 100px rgba(255,255,255,0.10), 0 20px 60px rgba(0,0,0,0.5); }
    }

    .hub-center-ko {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #ffffff;
    }
    .hub-center-en {
      font-family: 'Inter', sans-serif; font-weight: 800;
      font-size: 15px; color: rgba(255,255,255,0.55); letter-spacing: 1px; margin-top: 3px;
    }
    .hub-center-sub {
      font-size: 10px; color: var(--muted);
      margin-top: 10px; line-height: 1.7;
    }

    /* ── Nodes ── */
    .hub-node {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 114px;
      text-align: center;
      z-index: 10;
    }

    @keyframes card-in {
      from { opacity: 0; transform: scale(0.78); }
      to   { opacity: 1; transform: scale(1); }
    }

    .hub-node-card {
      background: #111113;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 32px;
      padding: 22px 10px 16px;
      border: none;
      position: relative;
      box-shadow:
        0 0 28px rgba(255,255,255,0.04),
        0 10px 40px rgba(0,0,0,0.5);
      transition:
        transform .3s cubic-bezier(.34,1.56,.64,1),
        box-shadow .25s ease;
    }

    /* 그라데이션 테두리 */
    .hub-node-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 32px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 35%,
        rgba(255,255,255,0.02) 60%,
        rgba(255,255,255,0.10) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .hub-node:hover .hub-node-card {
      transform: scale(1.1) translateY(-5px);
      box-shadow:
        0 0 40px rgba(255,255,255,0.07),
        0 28px 70px rgba(0,0,0,0.55);
    }

    .hub-node:hover .hub-node-card::before {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.35) 0%,
        rgba(255,255,255,0.08) 35%,
        rgba(255,255,255,0.03) 60%,
        rgba(255,255,255,0.16) 100%
      );
    }

    .hub-node-icon-wrap {
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
      font-size: 22px;
    }

    .hub-node-name {
      font-size: 12px; font-weight: 700; letter-spacing: -0.2px;
      color: #f5f5f7; line-height: 1.3;
    }

    .hub-node-desc {
      font-size: 9.5px; color: var(--muted);
      margin-top: 4px; line-height: 1.4;
    }

    /* ── Tagline ── */
    .hub-tagline {
      margin-top: 24px;
      font-size: 11.5px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }

    /* ── Mobile ── */
    .mobile-hub { display: none; width: 100%; max-width: 390px; }

    .mobile-center {
      text-align: center;
      padding: 8px 0 30px;
    }

    .mobile-center-ko {
      font-size: 34px; font-weight: 700; letter-spacing: -0.5px; color: #ffffff;
    }
    .mobile-center-en {
      font-family: 'Inter', sans-serif; font-weight: 800;
      font-size: 20px; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-top: 3px;
    }
    .mobile-center-sub {
      font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.5;
    }

    .mobile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

    .mobile-card {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 26px;
      padding: 22px 10px 18px;
      text-align: center;
      border: none;
      position: relative;
      box-shadow:
        0 0 20px rgba(255,255,255,0.03),
        0 4px 20px rgba(0,0,0,0.4);
      transition: transform .15s;
      display: block;
    }

    .mobile-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 26px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.20) 0%,
        rgba(255,255,255,0.05) 40%,
        rgba(255,255,255,0.01) 60%,
        rgba(255,255,255,0.09) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .mobile-card:active {
      transform: scale(0.96);
    }

    .mobile-card-icon-wrap {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 9px;
      font-size: 22px;
    }

    .mobile-card-name { font-size: 13px; font-weight: 700; color: #f5f5f7; }
    .mobile-card-desc { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 16px 20px 22px;
      font-size: 11px; color: rgba(255,255,255,0.2);
      line-height: 1.8;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      header { padding: 16px 20px; }
      .hub, .hub-tagline, .bg-glow { display: none; }
      .mobile-hub { display: block; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<header>
  <div class="brand">
    <span class="brand-ko">휴대폰광장</span>
    <span class="brand-en">TechNote</span>
  </div>
  <a class="header-contact" href="tel:0507-1344-4288">
    <span>📞</span> 0507-1344-4288
  </a>
</header>

<main>
  <!-- Desktop Hub -->
  <div class="hub" id="hub">
    <div class="orbit-outer"></div>
    <div class="orbit-inner"></div>
    <svg class="hub-svg" id="hub-svg"></svg>
    <div class="hub-center">
      <div class="hub-center-ko">휴대폰광장</div>
      <div class="hub-center-en">TechNote</div>
      <div class="hub-center-sub">군산·서천<br>프리미엄 전문점</div>
    </div>
  </div>

  <div class="hub-tagline">Select a category</div>

  <!-- Mobile -->
  <div class="mobile-hub">
    <div class="mobile-center">
      <div class="mobile-center-ko">휴대폰광장</div>
      <div class="mobile-center-en">TechNote</div>
      <div class="mobile-center-sub">군산·서천 프리미엄 휴대폰 전문점</div>
    </div>
    <div class="mobile-grid" id="mobile-grid"></div>
  </div>
</main>

<footer>
  대표 이성완 &nbsp;|&nbsp; 사업자등록번호 176-10-01227 &nbsp;|&nbsp; 충청남도 서천군 서천읍 서천로 182
</footer>

<script>
const CATS = [
  { name: '지점 안내',   icon: '📍', desc: '4개 지점 위치·연락처', url: 'branches.html',      angle: -90,  color: '#30d158', bg: 'rgba(48,209,88,0.15)',
    gradient: 'linear-gradient(150deg, rgba(48,209,88,0.13) 0%, rgba(48,209,88,0.02) 50%, #0d0d10 100%)' },
  { name: '사전승낙서',  icon: '📋', desc: '무선·유선 승낙서',     url: 'approval.html',      angle: -30,  color: '#a78bfa', bg: 'rgba(167,139,250,0.15)',
    gradient: 'linear-gradient(150deg, rgba(167,139,250,0.13) 0%, rgba(167,139,250,0.02) 50%, #0d0d10 100%)' },
  { name: '이달의 혜택', icon: '💎', desc: '최신 단가·특가',        url: 'prices.html',        angle:  30,  color: '#bf5af2', bg: 'rgba(191,90,242,0.15)',
    gradient: 'linear-gradient(150deg, rgba(191,90,242,0.13) 0%, rgba(191,90,242,0.02) 50%, #0d0d10 100%)' },
  { name: '최신 소식',  icon: '📰', desc: '블로그 테크노트',        url: 'news.html',          angle:  90,  color: '#ff9f0a', bg: 'rgba(255,159,10,0.15)',
    gradient: 'linear-gradient(150deg, rgba(255,159,10,0.13) 0%, rgba(255,159,10,0.02) 50%, #0d0d10 100%)' },
  { name: '테크뉴스',   icon: '📡', desc: '모바일 트렌드',          url: 'technews.html',      angle:  150, color: '#5ac8fa', bg: 'rgba(90,200,250,0.15)',
    gradient: 'linear-gradient(150deg, rgba(90,200,250,0.13) 0%, rgba(90,200,250,0.02) 50%, #0d0d10 100%)' },
  { name: '전화 상담',  icon: '📞', desc: '바로 전화 연결',         url: 'tel:0507-1344-4288', angle:  210, color: '#ff453a', bg: 'rgba(255,69,58,0.15)',
    gradient: 'linear-gradient(150deg, rgba(255,69,58,0.13) 0%, rgba(255,69,58,0.02) 50%, #0d0d10 100%)' },
];

const SIZE = 640, CX = 320, CY = 320, R = 235;
const hubEl = document.getElementById('hub');
const svgEl = document.getElementById('hub-svg');
svgEl.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);

CATS.forEach((cat, i) => {
  const rad = cat.angle * Math.PI / 180;
  const nx = CX + Math.cos(rad) * R;
  const ny = CY + Math.sin(rad) * R;

  /* Line */
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', CX); line.setAttribute('y1', CY);
  line.setAttribute('x2', nx); line.setAttribute('y2', ny);
  line.setAttribute('stroke', 'rgba(255,255,255,0.08)');
  line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '4 5');
  svgEl.appendChild(line);

  /* Endpoint dot */
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', nx); dot.setAttribute('cy', ny);
  dot.setAttribute('r', '3.5');
  dot.setAttribute('fill', cat.color);
  dot.setAttribute('opacity', '0.5');
  svgEl.appendChild(dot);

  /* Node */
  const a = document.createElement('a');
  a.href = cat.url;
  a.className = 'hub-node';
  a.style.left = nx + 'px';
  a.style.top  = ny + 'px';
  a.innerHTML = `
    <div class="hub-node-card" style="background:${cat.gradient}">
      <div class="hub-node-icon-wrap" style="background:${cat.bg}">${cat.icon}</div>
      <div class="hub-node-name">${cat.name}</div>
      <div class="hub-node-desc">${cat.desc}</div>
    </div>`;

  const card = a.querySelector('.hub-node-card');
  card.style.animation = `card-in .55s cubic-bezier(.34,1.56,.64,1) ${i * 0.07 + 0.15}s both`;

  hubEl.appendChild(a);

  a.addEventListener('mouseenter', () => {
    line.setAttribute('stroke', cat.color);
    line.setAttribute('stroke-opacity', '0.6');
    line.setAttribute('stroke-dasharray', '0');
    line.setAttribute('stroke-width', '1.5');
    dot.setAttribute('opacity', '1');
    dot.setAttribute('r', '4.5');
    card.style.boxShadow = `0 24px 64px rgba(0,0,0,0.6), 0 0 32px ${cat.color}28`;
  });
  a.addEventListener('mouseleave', () => {
    line.setAttribute('stroke', 'rgba(255,255,255,0.08)');
    line.setAttribute('stroke-opacity', '1');
    line.setAttribute('stroke-dasharray', '4 5');
    line.setAttribute('stroke-width', '1');
    dot.setAttribute('opacity', '0.5');
    dot.setAttribute('r', '3.5');
    card.style.boxShadow = '';
  });
});

/* Mobile */
const mGrid = document.getElementById('mobile-grid');
CATS.forEach(cat => {
  const a = document.createElement('a');
  a.href = cat.url;
  a.className = 'mobile-card';
  a.style.background = cat.gradient;
  a.innerHTML = `
    <div class="mobile-card-icon-wrap" style="background:${cat.bg}">${cat.icon}</div>
    <div class="mobile-card-name">${cat.name}</div>
    <div class="mobile-card-desc">${cat.desc}</div>`;
  mGrid.appendChild(a);
});
</script>

</body>
</html>
