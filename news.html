<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>최신 소식 | 휴대폰광장 TechNote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050507; --surface: #1c1c1e; --text: #f5f5f7;
      --blue: #2997ff; --muted: #86868b; --border: rgba(255,255,255,0.08);
      --shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    body {
      background: var(--bg); color: #f5f5f7;
      font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 45vh;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 50%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    a { text-decoration: none; color: inherit; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 44px;
      background: rgba(5,5,7,0.8);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky; top: 0; z-index: 100;
    }
    .back { display: flex; align-items: center; gap: 6px; font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 500; transition: color .2s; }
    .back:hover { color: rgba(255,255,255,0.85); }
    .brand { display: flex; align-items: baseline; gap: 7px; }
    .brand-ko { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .brand-en { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 0.8px; }

    main {
      position: relative; z-index: 1;
      flex: 1; max-width: 860px; margin: 0 auto;
      width: 100%; padding: 52px 24px 60px;
    }

    .page-title { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    .page-sub { font-size: 15px; color: #86868b; margin-bottom: 44px; }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .blog-card {
      background: #1c1c1e;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: var(--shadow);
      border: 1.5px solid transparent;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .blog-card:hover {
      border-color: var(--blue);
      box-shadow: 0 8px 32px rgba(0,113,227,0.12);
      transform: translateY(-2px);
    }

    .blog-date { font-size: 11px; color: #86868b; }

    .blog-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: #f5f5f7;
      flex: 1;
    }

    .blog-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--blue);
      font-weight: 600;
      margin-top: 4px;
    }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      color: #86868b;
      padding: 40px;
      font-size: 14px;
    }

    .blog-more {
      text-align: center;
      margin-top: 36px;
    }

    .btn-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      color: #f5f5f7;
      font-size: 14px;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: 40px;
      transition: opacity .2s;
    }

    .btn-more:hover { opacity: .8; }

    footer {
      text-align: center;
      padding: 18px 20px 24px;
      font-size: 11px;
      color: #86868b;
      line-height: 1.8;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 640px) {
      header { padding: 18px 20px; }
      .page-title { font-size: 28px; }
    }
  </style>
</head>
<body>

<header>
  <a class="back" href="index.html">← 홈으로</a>
  <div class="brand">
    <span class="brand-ko">휴대폰광장</span>
    <span class="brand-en">TechNote</span>
  </div>
</header>

<main>
  <div class="page-title">📰 최신 소식</div>
  <div class="page-sub">휴대폰광장 네이버 블로그 테크노트의 최신 포스트입니다.</div>

  <div class="blog-grid" id="blog-grid">
    <div class="loading">포스트를 불러오는 중입니다...</div>
  </div>

  <div class="blog-more">
    <a class="btn-more" href="https://blog.naver.com/sw112_" target="_blank">
      블로그 전체 보기 →
    </a>
  </div>
</main>

<footer>
  대표 이성완 &nbsp;|&nbsp; 사업자등록번호 176-10-01227<br>
  충청남도 서천군 서천읍 서천로 182
</footer>

<script>
(async () => {
  const RSS = 'https://rss.blog.naver.com/sw112_.xml';
  const API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS)}&count=9`;
  const grid = document.getElementById('blog-grid');
  try {
    const data = await fetch(API).then(r => r.json());
    const items = data.items || [];
    if (!items.length) throw new Error('empty');
    grid.innerHTML = items.map(item => `
      <a class="blog-card" href="${item.link}" target="_blank">
        <div class="blog-date">${(item.pubDate || '').slice(0, 10)}</div>
        <div class="blog-title">${item.title}</div>
        <div class="blog-link">포스트 보기 →</div>
      </a>`).join('');
  } catch {
    grid.innerHTML = '<div class="loading">포스트를 불러올 수 없습니다. 블로그를 직접 방문해 주세요.</div>';
  }
})();
</script>

</body>
</html>
