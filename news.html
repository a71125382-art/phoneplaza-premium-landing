<script>
const CAT_KEYWORDS = {
  phone:   ['갤럭시', '아이폰', '스펙', '비교', '추천', '후기', '폴드', '플립', '폰비교', '기기'],
  tech:    ['테크', 'AI', '인공지능', '뉴스', '업데이트', '출시', '발표', '삼성', '애플'],
  plan:    ['요금제', '통신', 'SKT', 'KT', 'LG', '공시', '약정', '선택약정', '번호이동', '기기변경'],
  webtoon: ['웹툰', '폰순이', '광장이야기'],
};

function classify(title) {
  for (const [cat, kws] of Object.entries(CAT_KEYWORDS)) {
    if (kws.some(kw => title.includes(kw))) return cat;
  }
  return 'other';
}

function renderItems(items, activeCat) {
  const grid = document.getElementById('blog-grid');
  const filtered = activeCat === 'all' ? items : items.filter(it => it._cat === activeCat);
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-msg">해당 카테고리 포스트가 없습니다.</div>';
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <a class="blog-card" href="${item.link}" target="_blank">
      <div class="blog-date">${(item.pubDate || '').slice(0, 10)}</div>
      <div class="blog-title">${item.title}</div>
      <div class="blog-link">포스트 보기 →</div>
    </a>`).join('');
}

(async () => {
  const RSS = 'https://rss.blog.naver.com/sw112_.xml';
  const API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS)}`;
  const grid = document.getElementById('blog-grid');

  const initCat = location.hash === '#phone' ? 'phone' : 'all';

  let allItems = [];
  let activeCat = initCat;

  try {
    const data = await fetch(API).then(r => r.json());
    allItems = (data.items || []).map(it => ({ ...it, _cat: classify(it.title) }));
    if (!allItems.length) throw new Error('empty');
  } catch {
    grid.innerHTML = '<div class="loading">포스트를 불러올 수 없습니다. 블로그를 직접 방문해 주세요.</div>';
    return;
  }

  document.getElementById('cat-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-tab');
    if (!btn) return;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderItems(allItems, activeCat);
  });

  if (initCat !== 'all') {
    document.querySelectorAll('.cat-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.cat === initCat);
    });
  }

  renderItems(allItems, activeCat);
})();
</script>
